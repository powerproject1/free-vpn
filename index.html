<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOOSTX VPN</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:Inter,sans-serif;
background:#050505;
color:#fff;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.bg{
position:fixed;
inset:0;
background:
radial-gradient(circle at top left, rgba(124,58,237,.25), transparent 45%),
radial-gradient(circle at bottom right, rgba(59,130,246,.20), transparent 45%);
filter:blur(90px);
z-index:-1;
}

.card{
width:100%;
max-width:900px;
background:rgba(255,255,255,.04);
border:1px solid rgba(255,255,255,.08);
border-radius:28px;
padding:28px;
backdrop-filter:blur(25px);
box-shadow:0 30px 90px rgba(0,0,0,.8);
}

.top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.badge{
padding:8px 14px;
border-radius:999px;
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.1);
font-weight:700;
}

.status{
display:flex;
align-items:center;
gap:10px;
font-weight:800;
}

.dot{
width:10px;
height:10px;
border-radius:50%;
background:#00ff88;
box-shadow:0 0 15px #00ff88;
}

h1{
font-size:44px;
margin:0;
font-weight:900;
}

.subtitle{
color:#9ca3af;
margin-top:6px;
margin-bottom:20px;
}

.preview{
background:#0a0a0a;
border:1px solid rgba(255,255,255,.08);
border-radius:18px;
padding:18px;
max-height:260px;
overflow:auto;
}

pre{
font-size:12px;
color:#38bdf8;
white-space:pre-wrap;
}

button{
margin-top:18px;
width:100%;
padding:18px;
border:none;
border-radius:18px;
cursor:pointer;
font-size:18px;
font-weight:900;
color:#fff;
background:linear-gradient(135deg,#7c3aed,#2563eb);
}

#toast{
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%) translateY(40px);
background:rgba(0,0,0,.85);
padding:12px 18px;
border-radius:14px;
border:1px solid rgba(255,255,255,.1);
opacity:0;
transition:.3s;
font-weight:800;
}

#toast.show{
opacity:1;
transform:translateX(-50%) translateY(0);
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="card">

<div class="top">
<div class="status">
<div class="dot"></div>
<span>ONLINE</span>
</div>

<div class="badge">BOOSTX VPN</div>
</div>

<h1>BOOSTX</h1>
<div class="subtitle">Premium Config</div>

<div class="subtitle">📦 Конфигурация (JSON)</div>

<div class="preview">
<pre id="preview"></pre>
</div>

<div class="subtitle">
Сервер: <span id="server"></span>
</div>

<button onclick="copyConfig()">📋 СКОПИРОВАТЬ</button>

</div>

<div id="toast">СКОПИРОВАНО</div>

<script>

// ===== CONFIG =====
const config = {
  burstObservatory: {
    pingConfig: {
      connectivity: "",
      destination: "http://www.gstatic.com/generate_204",
      interval: "2m",
      sampling: 3,
      timeout: "3s"
    },
    subjectSelector: ["proxy"]
  },
  dns: {
    hosts: {
      "cloudflare-dns.com": "1.1.1.1",
      "dns.google": "8.8.8.8"
    },
    queryStrategy: "UseIPv4",
    servers: [
      "https://cloudflare-dns.com/dns-query",
      {
        address: "https://cloudflare-dns.com/dns-query",
        domains: []
      },
      {
        address: "https://dns.google/dns-query",
        domains: ["domain:.ru","domain:.xn--p1ai"]
      }
    ]
  },
  inbounds: [
    {
      listen: "127.0.0.1",
      port: 10808,
      protocol: "socks",
      settings: { auth: "noauth", udp: true, userLevel: 8 },
      sniffing: { destOverride: ["http","tls","quic"], enabled: true },
      tag: "socks"
    },
    {
      listen: "127.0.0.1",
      port: 10809,
      protocol: "http",
      settings: { userLevel: 8 },
      sniffing: { destOverride: ["http","tls","quic"], enabled: true },
      tag: "http"
    },
    {
      listen: "127.0.0.1",
      port: 11111,
      protocol: "dokodemo-door",
      settings: { address: "127.0.0.1" },
      tag: "metrics_in"
    }
  ],
  log: { loglevel: "warning" },
  meta: null,
  metrics: { tag: "metrics_out" },
  outbounds: [
    {
      protocol: "vless",
      settings: {
        vnext: [
          {
            address: "2.26.82.219",
            port: 443,
            users: [
              {
                encryption: "none",
                flow: "xtls-rprx-vision",
                id: "eb0b8252-5d78-46fc-9154-7005e3a150c6"
              }
            ]
          }
        ]
      },
      streamSettings: {
        network: "tcp",
        realitySettings: {
          fingerprint: "firefox",
          publicKey: "W9co3pXpjBKJ71a0c3CUm-xEYKRr5N_Da6VHfWnmxTo",
          serverName: "nl5.cyphervpn.pro",
          shortId: "8e3962faa693e66c"
        },
        security: "reality",
        tcpSettings: {}
      },
      tag: "proxy"
    }
  ],
  policy: {},
  remarks: "BOOSTX VPN",
  routing: { balancers: [], rules: [] },
  stats: {}
};

const FULL = JSON.stringify(config, null, 2);

document.getElementById("preview").innerText = FULL;

document.getElementById("server").innerText =
  config?.outbounds?.[0]?.settings?.vnext?.[0]?.address || "—";

// ===== FIX COPY =====
function copyConfig() {
  const text = FULL;

  const fallback = () => {
    const ta = document.createElement("textarea");
    ta.value = text;
    ta.style.position = "fixed";
    ta.style.left = "-9999px";
    document.body.appendChild(ta);
    ta.select();
    try {
      document.execCommand("copy");
      showToast("СКОПИРОВАНО");
    } catch {
      showToast("ОШИБКА");
    }
    document.body.removeChild(ta);
  };

  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text)
      .then(() => showToast("СКОПИРОВАНО"))
      .catch(fallback);
  } else {
    fallback();
  }
}

function showToast(text) {
  const t = document.getElementById("toast");
  t.innerText = text;
  t.classList.add("show");

  setTimeout(() => {
    t.classList.remove("show");
  }, 2000);
}

</script>

</body>
</html>
