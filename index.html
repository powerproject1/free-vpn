<title>BOOSTX VPN</title>

<style>
body{
margin:0;
font-family:Inter,sans-serif;
background:#050505;
color:#fff;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.bg{
position:fixed;
inset:0;
background:
radial-gradient(circle at top left, rgba(124,58,237,.25), transparent 45%),
radial-gradient(circle at bottom right, rgba(59,130,246,.20), transparent 45%);
filter:blur(90px);
z-index:-1;
}

.card{
width:100%;
max-width:900px;
background:rgba(255,255,255,.04);
border:1px solid rgba(255,255,255,.08);
border-radius:28px;
padding:28px;
backdrop-filter:blur(25px);
box-shadow:0 30px 90px rgba(0,0,0,.8);
}

.top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.badge{
padding:8px 14px;
border-radius:999px;
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.1);
font-weight:700;
}

.status{
display:flex;
align-items:center;
gap:10px;
font-weight:800;
}

.dot{
width:10px;
height:10px;
border-radius:50%;
background:#00ff88;
box-shadow:0 0 15px #00ff88;
}

h1{
font-size:44px;
margin:0;
font-weight:900;
}

.subtitle{
color:#9ca3af;
margin-top:6px;
margin-bottom:20px;
}

.preview{
background:#0a0a0a;
border:1px solid rgba(255,255,255,.08);
border-radius:18px;
padding:18px;
max-height:260px;
overflow:auto;
}

pre{
font-size:12px;
color:#38bdf8;
white-space:pre-wrap;
}

button{
margin-top:18px;
width:100%;
padding:18px;
border:none;
border-radius:18px;
cursor:pointer;
font-size:18px;
font-weight:900;
color:#fff;
background:linear-gradient(135deg,#7c3aed,#2563eb);
}

#toast{
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%) translateY(40px);
background:rgba(0,0,0,.85);
padding:12px 18px;
border-radius:14px;
border:1px solid rgba(255,255,255,.1);
opacity:0;
transition:.3s;
font-weight:800;
}

#toast.show{
opacity:1;
transform:translateX(-50%) translateY(0);
}
</style>
</head>

function copyConfig() {
  const text = FULL;

  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text);
  } else {
    const ta = document.createElement("textarea");
    ta.value = text;
    ta.style.position = "fixed";
    ta.style.left = "-9999px";
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    document.body.removeChild(ta);
  }

  const t = document.getElementById("toast");
  t.classList.add("show");

  setTimeout(() => {
    t.classList.remove("show");
  }, 2000);
}
